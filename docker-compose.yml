services:
  web:
    build: .
    container_name: claaxy-log
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: claaxy_log.settings
      DATABASE_PATH: /app/data/db.sqlite3
      MEDIA_ROOT: /app/media
    volumes:
      - ./.env:/app/.env:ro
      - claaxy_data:/app/data
      - claaxy_media:/app/media
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  claaxy_data:
  claaxy_media:
