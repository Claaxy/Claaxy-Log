services:
  web:
    build: .
    container_name: claaxy-log
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: claaxy_log.settings
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SITE_DOMAIN: ${SITE_DOMAIN:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      USER_MODULE_ADMIN_EMAIL: ${USER_MODULE_ADMIN_EMAIL:-clu@taxnova.ca}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-4o-mini}
      DATABASE_PATH: /app/data/db.sqlite3
      MEDIA_ROOT: /app/media
    volumes:
      - claaxy_data:/app/data
      - claaxy_media:/app/media
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os,urllib.request;h=os.environ.get('ALLOWED_HOSTS','localhost').split(',')[0].strip();urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8000/',headers={'Host':h}))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  claaxy_data:
  claaxy_media:
